name: 'Wait for Tests'
description: 'Waits for a GitHub Actions workflow run to complete on the current commit'
inputs:
  workflow:
    description: 'Workflow file name to monitor'
    required: true
    default: 'tests.yaml'
  branch:
    description: 'Branch to monitor (defaults to current branch)'
    required: false
    default: ''
  github-token:
    description: 'GitHub token for API access'
    required: true
  should-wait-for-start:
    description: 'Poll until a run for this commit appears before watching it'
    required: false
    default: 'false'
  poll-interval:
    description: 'Seconds between polls when waiting for a run to appear'
    required: false
    default: '15'
  poll-attempts:
    description: 'Max number of poll attempts before giving up'
    required: false
    default: '40'

runs:
  using: 'composite'
  steps:
    - name: Wait for workflow run and watch it
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        BRANCH="${{ inputs.branch || github.head_ref || github.ref_name }}"
        WORKFLOW="${{ inputs.workflow }}"
        SHA="${{ github.sha }}"
        POLL_INTERVAL="${{ inputs.poll-interval }}"
        MAX_ATTEMPTS="${{ inputs.poll-attempts }}"
        SHOULD_WAIT="${{ inputs.should-wait-for-start }}"

        echo "Monitoring: $WORKFLOW on branch $BRANCH (sha: ${SHA:0:7})"

        find_run_id() {
          gh run list \
            --workflow="$WORKFLOW" \
            --branch="$BRANCH" \
            --limit=10 \
            --json databaseId,headSha \
            --jq --arg sha "$SHA" '.[] | select(.headSha == $sha) | .databaseId' \
            2>/dev/null | head -1
        }

        RUN_ID=$(find_run_id)

        if [ "$SHOULD_WAIT" = "true" ] && [ -z "$RUN_ID" ]; then
          echo "Run not found yet, polling every ${POLL_INTERVAL}s (max ${MAX_ATTEMPTS} attempts)..."
          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            sleep "$POLL_INTERVAL"
            RUN_ID=$(find_run_id)
            if [ -n "$RUN_ID" ]; then
              echo "Found run ID $RUN_ID (attempt $i)"
              break
            fi
            echo "Attempt $i/$MAX_ATTEMPTS: not found yet..."
          done
        fi

        if [ -z "$RUN_ID" ]; then
          echo "No run found for $WORKFLOW on $BRANCH at $SHA"
          exit 1
        fi

        echo "Watching run ID: $RUN_ID"
        gh run watch "$RUN_ID" --exit-status
