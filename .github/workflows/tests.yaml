name: tests

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      run_number:
        default: '1'
        required: true
        type: string

concurrency:
  group: tests-ci-run-${{ inputs.run_number }}-${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && github.run_id || github.head_ref || github.ref }}-${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  CI: 1
  PYTHONPATH: ${{ github.workspace }}
  PYTEST: pytest --continue-on-collection-errors --durations=0 -n logical

jobs:
  build_release:
    name: build release
    runs-on: ${{
      (github.repository == 'commaai/openpilot') &&
      ((github.event_name != 'pull_request') ||
      (github.event.pull_request.head.repo.full_name == 'commaai/openpilot'))
      && fromJSON('["namespace-profile-amd64-8x16"]')
      || fromJSON('["ubuntu-24.04"]') }}
    env:
      STRIPPED_DIR: /tmp/releasepilot
      PYTHONPATH: /tmp/releasepilot
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
    - name: Getting LFS files
      uses: nick-fields/retry@7152eba30c6575329ac0576536151aca5a72780e
      with:
        timeout_minutes: 2
        max_attempts: 3
        command: git lfs pull
    - name: Build devel
      timeout-minutes: 1
      run: ALLOW_WIPE_TARGET_DIR=1 TARGET_DIR=$STRIPPED_DIR release/build_stripped.sh
    - run: |
        sudo chmod +x tools/setup_dependencies.sh
        ./tools/op.sh setup
    - name: Build openpilot and run checks
      timeout-minutes: 30
      working-directory: ${{ env.STRIPPED_DIR }}
      run: python3 system/manager/build.py
    - name: Run tests
      timeout-minutes: 1
      working-directory: ${{ env.STRIPPED_DIR }}
      run: release/check-dirty.sh
    - name: Check submodules
      if: github.repository == 'hoofpilot/hoofpilot'
      timeout-minutes: 3
      run: |
        if [ "${{ github.ref }}" != "refs/heads/master" ]; then
          if ! git fetch --no-recurse-submodules origin master:refs/remotes/origin/master; then
            echo "::warning::Failed to fetch origin/master for PR submodule diff. Continuing without PR-specific submodule path detection."
          fi

          if git show-ref --verify --quiet refs/remotes/origin/master; then
            SUBMODULE_PATHS=$(git diff origin/master HEAD --name-only | grep -E '^[^/]+$' | while read path; do
              if git ls-files --stage "$path" | grep -q "^160000"; then
                echo "$path"
              fi
            done | tr '\n' ' ')

            if [ -n "$SUBMODULE_PATHS" ]; then
              echo "Changed submodule paths: $SUBMODULE_PATHS"
              export SUBMODULE_PATHS="$SUBMODULE_PATHS"
              export CHECK_PR_REFS=true
            fi
          else
            echo "::warning::origin/master is unavailable. Skipping PR-specific submodule path detection."
          fi
        fi
        release/check-submodules.sh

  build_mac:
    name: build macOS
    if: false  # There'll be one day that this works. That day is not today.
    runs-on: ${{ ((github.repository == 'commaai/openpilot') && ((github.event_name != 'pull_request') || (github.event.pull_request.head.repo.full_name == 'commaai/openpilot'))) && 'namespace-profile-macos-8x14' || 'macos-latest' }}
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
    - run: |
        sudo chmod +x tools/setup_dependencies.sh
        ./tools/op.sh setup
    - name: Building openpilot
      run: scons

  static_analysis:
    name: static analysis
    runs-on: ${{
      (github.repository == 'commaai/openpilot') &&
      ((github.event_name != 'pull_request') ||
      (github.event.pull_request.head.repo.full_name == 'commaai/openpilot'))
      && fromJSON('["namespace-profile-amd64-8x16"]')
      || fromJSON('["ubuntu-24.04"]') }}
    env:
      PYTHONWARNINGS: default
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
    - run: |
        sudo chmod +x tools/setup_dependencies.sh
        ./tools/op.sh setup
    - name: Static analysis
      timeout-minutes: 1
      run: scripts/lint/lint.sh

  unit_tests:
    name: unit tests
    runs-on: ${{
      (github.repository == 'commaai/openpilot') &&
      ((github.event_name != 'pull_request') ||
      (github.event.pull_request.head.repo.full_name == 'commaai/openpilot'))
      && fromJSON('["namespace-profile-amd64-8x16"]')
      || fromJSON('["ubuntu-24.04"]') }}
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
    - run: |
        sudo chmod +x tools/setup_dependencies.sh
        ./tools/op.sh setup
    - name: Build openpilot
      run: scons -j$(nproc)
    - name: Run unit tests
      timeout-minutes: ${{ contains(runner.name, 'nsc') && 2 || 999 }}
      run: |
        source selfdrive/test/setup_xvfb.sh
        # Pre-compile Python bytecode so each pytest worker doesn't need to
        $PYTEST --collect-only -m 'not slow' -qq
        MAX_EXAMPLES=1 $PYTEST -m 'not slow'

  process_replay:
    name: process replay
    if: false  # disable process_replay for forks
    runs-on: ${{
      (github.repository == 'commaai/openpilot') &&
      ((github.event_name != 'pull_request') ||
      (github.event.pull_request.head.repo.full_name == 'commaai/openpilot'))
      && fromJSON('["namespace-profile-amd64-8x16"]')
      || fromJSON('["ubuntu-24.04"]') }}
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
    - run: |
        sudo chmod +x tools/setup_dependencies.sh
        ./tools/op.sh setup
    - name: Build openpilot
      run: scons -j$(nproc)
    - name: Run replay
      timeout-minutes: ${{ contains(runner.name, 'nsc') && 2 || 20 }}
      continue-on-error: ${{ github.ref == 'refs/heads/master' }}
      run: selfdrive/test/process_replay/test_processes.py -j$(nproc)
    - name: Print diff
      id: print-diff
      if: always()
      run: cat selfdrive/test/process_replay/diff.txt
    - uses: actions/upload-artifact@v6
      if: always()
      continue-on-error: true
      with:
        name: process_replay_diff.txt
        path: selfdrive/test/process_replay/diff.txt

  simulator_driving:
    name: simulator driving
    runs-on: ${{
      (github.repository == 'commaai/openpilot') &&
      ((github.event_name != 'pull_request') ||
      (github.event.pull_request.head.repo.full_name == 'commaai/openpilot'))
      && fromJSON('["namespace-profile-amd64-8x16"]')
      || fromJSON('["ubuntu-24.04"]') }}
    if: false  # FIXME: Started to timeout recently
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
    - run: |
        sudo chmod +x tools/setup_dependencies.sh
        ./tools/op.sh setup
    - name: Build openpilot
      run: scons -j$(nproc)
    - name: Driving test
      timeout-minutes: 2
      run: |
        source selfdrive/test/setup_xvfb.sh
        pytest -s tools/sim/tests/test_metadrive_bridge.py

  create_raylib_ui_report:
    name: Create raylib UI Report
    runs-on: ${{
      (github.repository == 'commaai/openpilot') &&
      ((github.event_name != 'pull_request') ||
      (github.event.pull_request.head.repo.full_name == 'commaai/openpilot'))
      && fromJSON('["namespace-profile-amd64-8x16"]')
      || fromJSON('["ubuntu-24.04"]') }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - run: |
          sudo chmod +x tools/setup_dependencies.sh
          ./tools/op.sh setup
      - name: Build openpilot
        run: scons -j$(nproc)
      - name: Create raylib UI Report
        run: |
          source selfdrive/test/setup_xvfb.sh
          PYTHONWARNINGS=ignore python3 selfdrive/ui/tests/test_ui/raylib_screenshots.py
      - name: Upload Raylib UI Report
        uses: actions/upload-artifact@v6
        with:
          name: raylib-report-${{ inputs.run_number || '1' }}-${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && 'master' || github.event.number }}
          path: selfdrive/ui/tests/test_ui/raylib_report/screenshots

  create_mici_raylib_ui_report:
    name: Create mici raylib UI Report
    runs-on: ${{
      (github.repository == 'commaai/openpilot') &&
      ((github.event_name != 'pull_request') ||
      (github.event.pull_request.head.repo.full_name == 'commaai/openpilot'))
      && fromJSON('["namespace-profile-amd64-8x16"]')
      || fromJSON('["ubuntu-24.04"]') }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - run: |
          sudo chmod +x tools/setup_dependencies.sh
          ./tools/op.sh setup
      - name: Build openpilot
        run: scons -j$(nproc)
      - name: Create mici raylib UI Report
        run: |
          source selfdrive/test/setup_xvfb.sh
          PYTHONWARNINGS=ignore WINDOWED=1 python3 selfdrive/ui/tests/diff/replay.py
      - name: Upload mici raylib UI Report
        uses: actions/upload-artifact@v6
        with:
          name: mici-raylib-report-${{ inputs.run_number || '1' }}-${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && 'master' || github.event.number }}
          path: selfdrive/ui/tests/diff/report
